server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 🔹 Библиотека
    location /library/ {
        proxy_pass http://kiwix:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 30s; proxy_read_timeout 120s;
    }

    # 🔹 Карты
    location /maps/ {
        proxy_pass http://tileserver:8080/;
        proxy_set_header Host $host;
        proxy_cache_valid 200 7d;
    }

   # 🔹 Доска задач (Kanboard)
    location /tasks/ {
        proxy_pass http://kanboard:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        auth_basic "Task Board";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

   # 🔹 Заметки (Trilium Notes)
    location /notes/ {
        proxy_pass http://trilium:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        auth_basic "Knowledge Base";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

 # 🔹 Файлы
    location /files/ {
        proxy_pass http://filebrowser:80/;
        proxy_set_header Host $host;
        auth_basic "Library Files";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

 # 🔹 Мониторинг
    location /status/ {
        proxy_pass http://glances:61208/;
        auth_basic "Admin Monitor";
        auth_basic_user_file /etc/nginx/.htpasswd;
    }

# Статика
    location ~* \.(pdf|djvu|epub|zim|mbtiles|json|js|css|png|svg|jpg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Content-Disposition "inline";
        access_log off;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}