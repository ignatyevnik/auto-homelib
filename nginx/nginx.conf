worker_processes auto;
pid /tmp/nginx.pid;
error_log /tmp/nginx-error.log warn;

events { 
    worker_connections 1024; 
    multi_accept on;
}

http {
    # Временные пути для непривилегированного пользователя
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;
    
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 0;
    
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /tmp/nginx-access.log;
    
    # Настройки прокси
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
    proxy_read_timeout 300;

    # WebSocket поддержка
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 8080;
        server_name _;  # 🔑 Принимаем запросы с любых имен
        
        # 🔑 Разрешаем доступ со всех IP в локальной сети
        allow 192.168.0.0/16;
        allow 172.16.0.0/12;
        allow 10.0.0.0/8;
        allow 127.0.0.1;
        deny all;

        # Базовая авторизация
        auth_basic "HomeLab Library";
        auth_basic_user_file /etc/nginx/.htpasswd;

        # ==================== ГЛАВНАЯ СТРАНИЦА ====================
        location = / {
            root /usr/share/nginx/html;
            try_files /index.html =404;
            auth_basic off;  # Дашборд без авторизации
            allow all;  # 🔑 Доступ для всех
        }

        # ==================== API GLANCES ====================
        location /api/glances/ {
            proxy_pass http://glances:61208/api/3/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            auth_basic off;
            allow all;
        }

        # ==================== KIWIX ====================
        location /kiwix/ {
            proxy_pass http://kiwix:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_redirect http://kiwix:8080/ /kiwix/;
            proxy_redirect http://$host/ /kiwix/;
        }

        # ==================== TILESERVER ====================
        location /maps/ {
            proxy_pass http://tileserver:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            add_header Access-Control-Allow-Origin *;
        }

        # ==================== FILEBROWSER ====================
        location /files/ {
            proxy_pass http://filebrowser:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_redirect http://$host/ /files/;
            proxy_redirect http://filebrowser:8080/ /files/;
            
            sub_filter_once off;
            sub_filter 'href="/' 'href="/files/';
            sub_filter 'src="/' 'src="/files/';
            sub_filter 'action="/' 'action="/files/';
            sub_filter_types text/html;
        }

        # ==================== KANBOARD ====================
        location /tasks/ {
            proxy_pass http://kanboard:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_redirect http://kanboard:80/ /tasks/;
            proxy_redirect http://$host/ /tasks/;
            
            sub_filter_once off;
            sub_filter 'href="/' 'href="/tasks/';
            sub_filter 'src="/' 'src="/tasks/';
            sub_filter 'action="/' 'action="/tasks/';
            sub_filter_types text/html text/css application/javascript;
        }

        # ==================== TRILIUM ====================
        location /notes/ {
            proxy_pass http://trilium:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            
            proxy_redirect http://trilium:8080/ /notes/;
            proxy_redirect http://$host/ /notes/;
            
            sub_filter_once off;
            sub_filter 'href="/' 'href="/notes/';
            sub_filter 'src="/' 'src="/notes/';
            sub_filter 'action="/' 'action="/notes/';
            sub_filter_types text/html application/javascript;
        }

        # ==================== GLANCES ====================
        location /monitor/ {
            proxy_pass http://glances:61208/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            proxy_read_timeout 60s;
            
            sub_filter_once off;
            sub_filter 'href="/' 'href="/monitor/';
            sub_filter 'src="/' 'src="/monitor/';
            sub_filter 'action="/' 'action="/monitor/';
            sub_filter_types text/html text/css application/javascript;
        }

        # ==================== СТАТИКА ====================
        location /books/ {
            alias /usr/share/nginx/html/books/;
            autoindex on;
            autoindex_exact_size off;
            autoindex_localtime on;
        }
    }
}