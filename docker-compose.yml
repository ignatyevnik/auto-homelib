version: '3.8'

# ==================== СЕТИ ====================
networks:
  homelib-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ==================== VOLUMES ====================
volumes:
  zim_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd1/docker/kiwix
  books_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd1/docker/books
  downloads_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd1/downloads
  maps_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd2/docker/maps
  trilium_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd2/docker/trilium
  kanboard_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd2/docker/kanboard
  filebrowser_db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /mnt/hdd2/docker/filebrowser

# ==================== СЕРВИСЫ ====================
services:

  # -------------------- NGINX (ТОЧКА ВХОДА) --------------------
  nginx:
    image: nginx:alpine
    container_name: homelib-nginx
    user: "1000:1000"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      - ./nginx/dashboard.html:/usr/share/nginx/html/index.html:ro
      - books_data:/usr/share/nginx/html/books:ro
    ports:
      - "0.0.0.0:24:8080"  # 🔑 Слушаем на всех интерфейсах
    depends_on:
      - kiwix
      - tileserver
      - filebrowser
      - kanboard
      - trilium
      - glances
    networks:
      - homelib-net
    restart: unless-stopped
    environment:
      - NGINX_ENTRYPOINT_QUIET_LOGS=1

  # -------------------- KIWIX (БИБЛИОТЕКА) --------------------
  kiwix:
    image: kiwix/kiwix-serve:latest
    container_name: homelib-kiwix
    user: "1000:1000"
    volumes:
      - zim_data:/data
      - downloads_data:/downloaded
    environment:
      - http_proxy=${HTTP_PROXY:-}
      - https_proxy=${HTTPS_PROXY:-}
    command: "*.zim --port=8080 --address=0.0.0.0 --nolibrarybutton --urlRootLocation=/kiwix"
    networks:
      - homelib-net
    restart: unless-stopped

  # -------------------- TILESERVER (КАРТЫ) --------------------
  tileserver:
    image: maptiler/tileserver-gl:latest
    container_name: homelib-tileserver
    user: "1000:1000"
    volumes:
      - maps_data:/data
      - ./tileserver/config.json:/data/config.json:ro
    environment:
      - NODE_ENV=production
    networks:
      - homelib-net
    restart: unless-stopped

  # -------------------- FILEBROWSER (ФАЙЛЫ) --------------------
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: homelib-files
    user: "1000:1000"
    volumes:
      - /mnt/hdd1:/srv/hdd1
      - /mnt/hdd2:/srv/hdd2
      - filebrowser_db:/database
    environment:
      - FB_BASEURL=/files
      - FB_PORT=8080
    networks:
      - homelib-net
    restart: unless-stopped

  # -------------------- KANBOARD (ЗАДАЧИ) --------------------
  kanboard:
    image: kanboard/kanboard:latest
    container_name: homelib-kanboard
    user: "1000:1000"
    volumes:
      - kanboard_data:/var/www/app/data
      - ./kanboard/plugins:/var/www/app/plugins
    environment:
      - DATABASE_URL=sqlite:///var/www/app/data/db.sqlite
      - BASE_URL=/tasks
    networks:
      - homelib-net
    restart: unless-stopped

  # -------------------- TRILIUM (ЗАМЕТКИ) --------------------
  trilium:
    image: zadam/trilium:latest
    container_name: homelib-trilium
    user: "1000:1000"
    volumes:
      - trilium_data:/home/node/trilium-data
    environment:
      - TRILIUM_DATA_DIR=/home/node/trilium-data
      - TRILIUM_BASE_URL=/notes
      - TRILIUM_PORT=8080
    networks:
      - homelib-net
    restart: unless-stopped

  # -------------------- GLANCES (МОНИТОРИНГ) --------------------
  glances:
    image: nicolargo/glances:latest
    container_name: homelib-glances
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    pid: "host"
    environment:
      - GLANCES_OPT=-w --disable-webui
    networks:
      - homelib-net
    restart: unless-stopped